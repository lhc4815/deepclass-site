<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Graduation cap -->
  <g transform="translate(256,240)" fill="white">
    <!-- Cap top -->
    <polygon points="0,-100 160,-40 0,20 -160,-40" opacity="0.95"/>
    <!-- Cap brim shadow -->
    <polygon points="0,20 160,-40 160,-25 0,35 -160,-25 -160,-40" opacity="0.7"/>
    <!-- Tassel string -->
    <line x1="0" y1="-100" x2="0" y2="-40" stroke="white" stroke-width="6" opacity="0.9"/>
    <!-- Tassel -->
    <line x1="0" y1="-40" x2="-50" y2="10" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <circle cx="-50" cy="15" r="10" opacity="0.9"/>
    <!-- Tassel end lines -->
    <line x1="-55" y1="15" x2="-60" y2="45" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="-50" y1="15" x2="-50" y2="50" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="-45" y1="15" x2="-40" y2="45" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  </g>
  <!-- Text: DC -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="100" fill="white" letter-spacing="8" opacity="0.95">DC</text>
</svg>
